<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeCombat Clone | Play</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ========== GAME VIEWPORT (Main Screen) ========== -->
  <div id="app-wrapper">

    <!-- TOP LEFT: BACK TO MAP -->
    <button class="btn-back" onclick="location.reload()">BACK TO MAP</button>

    <!-- TOP CENTER: WORLD BANNER -->
    <div class="center-banner">
      <div class="ribbon">KITHGARD DUNGEON</div>
      <div class="sub-banner">0 / 44</div>
    </div>

    <!-- TOP RIGHT: HUD STATS -->
    <div class="hud-right-panel">
      <div class="hud-stat">
        <span class="icon">💎</span>
        <span id="hud-gems">0</span>
      </div>
      <div class="hud-stat">
        <span class="icon">⭐</span>
        <span id="hud-stars">0</span>
      </div>
      <button class="btn-premium">BUY PREMIUM</button>
    </div>

    <!-- BOTTOM LEFT: GAME CONTROLS -->
    <div class="game-controls">
      <div class="ctrl-box" title="Hero Selection">🧙</div>
      <div class="ctrl-box" title="Equipment">🛡️</div>
      <div class="ctrl-box" title="Treasure">💰</div>
      <div class="ctrl-box" title="Trophy">🏆</div>
    </div>

    <!-- WORLD MAP VIEWPORT -->
    <main class="game-viewport" id="map-viewport">
      <div class="isometric-map" id="map-container">
        <svg id="map-svg" width="2400" height="1400" style="position:absolute; inset:0; pointer-events:none;"></svg>
        <div id="quest-nodes-container">
          <!-- Hollow circle nodes generated by JS -->
        </div>
      </div>
    </main>

    <!-- MISSION OVERLAY (Dungeon Style) -->
    <div id="section-mission" class="overlay-full" style="display:none;">
      <div class="wood-panel">
        <p id="mission-progress" style="font-family:var(--font-mono); font-size:0.8rem; color:var(--clr-amber);">STAGE
          1/5</p>
        <h2 id="question-text">Select the correct code...</h2>

        <div id="choices-grid" class="choices-grid">
          <!-- Choice buttons -->
        </div>

        <div id="result-bar" style="display:none; margin-top:20px;">
          <p id="result-msg" style="font-family:var(--font-game); font-size:1.5rem;"></p>
          <button class="btn-game" style="margin-top:15px;" onclick="nextQuestion()">Continue</button>
        </div>

        <button class="btn-game" style="background:#b71c1c; border-color:#8e1d1d; margin-top:20px; font-size:0.8rem;"
          onclick="exitMission()">Surrender</button>
      </div>
    </div>

  </div>

  <!-- INITIAL NAME OVERLAY -->
  <div id="name-overlay" class="overlay-full" style="display:none;">
    <div class="wood-panel">
      <h2>IDENTIFY HERO</h2>
      <input type="text" id="username-input" placeholder="Hero Name..." maxlength="12" />
      <button class="btn-game" onclick="finishLogin()">ENTER DUNGEON</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
